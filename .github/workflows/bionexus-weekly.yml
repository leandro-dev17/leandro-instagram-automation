name: BioNexus — Planejamento Semanal (Domingo)

on:
  schedule:
    - cron: '0 12 * * 1'    # 09:00 BRT segunda — Fiscal de Token
    - cron: '0 13 * * 1'    # 10:00 BRT segunda — Monitor de Engajamento
    - cron: '0 14 * * 1'    # 11:00 BRT segunda — Monitor de Crescimento
    - cron: '0 15 * * 1'    # 12:00 BRT segunda — Gerador de Receitas de Backup
    - cron: '0 20 * * 6'    # 17:00 BRT sábado — Agente Trending (antes do planner)
    - cron: '0 23 * * 0'    # 20:00 BRT domingo — Weekly Insights
    - cron: '30 23 * * 0'   # 20:30 BRT domingo — Weekly Planner + commit JSON
    - cron: '30 0 * * 0'    # 21:30 BRT domingo — Qualidade de Copy (após planner)
    - cron: '0 2 1 * *'     # 23:00 BRT do dia 1 — Sazonalidade (mensal)
    - cron: '0 2 * * 6'     # 23:00 BRT sexta — Limpeza de Artifacts
  workflow_dispatch:
    inputs:
      task:
        description: 'Tarefa: insights|planner|fiscal-token|monitor-engajamento|monitor-crescimento|gerador-receitas|agente-trending|qualidade-copy|sazonalidade|limpeza-artifacts'
        required: true
        default: 'planner'
        type: choice
        options:
          - insights
          - planner
          - fiscal-token
          - monitor-engajamento
          - monitor-crescimento
          - gerador-receitas
          - agente-trending
          - qualidade-copy
          - sazonalidade
          - limpeza-artifacts
          - planner

permissions:
  contents: write

jobs:
  # ── 20:00 BRT domingo — Weekly Insights ────────────────────────────────────
  weekly-insights:
    if: github.event.schedule == '0 23 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'insights')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
          EOF
      - name: Criar pasta de relatórios
        run: mkdir -p squads/leandro-instagram/automation/reports
      - name: Rodar Weekly Insights
        run: node weekly-insights.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          REPORTS_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/reports
      - name: Commitar relatório gerado
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/reports/
          git diff --staged --quiet || git commit -m "chore: relatório insights $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 20:30 BRT domingo — Weekly Planner (gera JSON + commita) ───────────────
  weekly-planner:
    if: github.event.schedule == '30 23 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'planner')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
          EOF
      - name: Rodar Weekly Planner
        run: node weekly-planner.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          REPORTS_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/reports
      - name: Commitar JSON semanal gerado
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/schedule/
          git diff --staged --quiet || git commit -m "chore: plano semanal $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Gerar dashboard de métricas
        continue-on-error: true
        run: node dashboard-generator.cjs
        working-directory: squads/leandro-instagram/automation
      - name: Commitar dashboard atualizado
        continue-on-error: true
        run: |
          git add squads/leandro-instagram/automation/dashboard/ || true
          git diff --staged --quiet || git commit -m "chore: dashboard atualizado $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enviar relatório semanal ao Telegram
        run: node weekly-report.cjs
        working-directory: squads/leandro-instagram/automation

  # ── 09:00 BRT segunda — Fiscal de Token ────────────────────────────────────
  fiscal-token:
    if: >
      github.event.schedule == '0 12 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'fiscal-token')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Fiscal de Token
        run: node fiscal-token.cjs
        working-directory: squads/leandro-instagram/automation

  # ── 10:00 BRT segunda — Monitor de Engajamento ──────────────────────────────
  monitor-engajamento:
    if: >
      github.event.schedule == '0 13 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'monitor-engajamento')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Monitor de Engajamento
        run: node monitor-engajamento.cjs
        working-directory: squads/leandro-instagram/automation
      - name: Commitar histórico de engajamento
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/logs/engajamento-historico.json || true
          git diff --staged --quiet || git commit -m "chore: histórico engajamento $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 11:00 BRT segunda — Monitor de Crescimento ──────────────────────────────
  monitor-crescimento:
    if: >
      github.event.schedule == '0 14 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'monitor-crescimento')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Monitor de Crescimento
        run: node monitor-crescimento.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Commitar histórico de crescimento
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/logs/crescimento-historico.json || true
          git diff --staged --quiet || git commit -m "chore: crescimento histórico $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 12:00 BRT segunda — Gerador de Receitas de Backup ───────────────────────
  gerador-receitas:
    if: >
      github.event.schedule == '0 15 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'gerador-receitas')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Gerador de Receitas de Backup
        run: node gerador-receitas-backup.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 17:00 BRT sábado — Agente Trending (antes do weekly-planner) ────────────
  agente-trending:
    if: >
      github.event.schedule == '0 20 * * 6' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'agente-trending')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Agente Trending
        run: node agente-trending.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 21:30 BRT domingo — Qualidade de Copy (após weekly-planner) ─────────────
  qualidade-copy:
    if: >
      github.event.schedule == '30 0 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'qualidade-copy')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Agente de Qualidade de Copy
        run: node agente-qualidade-copy.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 23:00 BRT do dia 1 de cada mês — Agente de Sazonalidade ────────────────
  sazonalidade:
    if: >
      github.event.schedule == '0 2 1 * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'sazonalidade')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Agente de Sazonalidade
        run: node agente-sazonalidade.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 23:00 BRT sexta — Limpeza de Artifacts ──────────────────────────────────
  limpeza-artifacts:
    if: >
      github.event.schedule == '0 2 * * 6' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'limpeza-artifacts')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Limpeza de Artifacts
        run: node limpeza-artifacts.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
