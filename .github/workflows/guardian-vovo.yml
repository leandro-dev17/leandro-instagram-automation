name: Guardião 24/7 — Vovó Teresinha

on:
  schedule:
    # Roda de 15 em 15 minutos, 24h por dia, 7 dias por semana
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo da execução manual'
        required: false
        default: 'Verificação manual'

permissions:
  contents: write

jobs:
  guardian:
    name: Verificação de saúde e autocorreção
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: squads/vovo-teresinha/guardian/package.json

      - name: Instalar dependências do guardião
        run: npm install
        working-directory: squads/vovo-teresinha/guardian

      - name: Executar guardião
        run: node monitor.cjs
        working-directory: squads/vovo-teresinha/guardian
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRON_SECRET:       ${{ secrets.VOVO_CRON_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_TOKEN:       ${{ secrets.VERCEL_TOKEN }}
          APP_URL: https://receitinhas-vovo-teresinha.vercel.app
          VERCEL_PROJECT_ID: prj_RtqsbSdxPMz81W2cr0tJyatRJGMv
          VERCEL_TEAM_ID: team_JnDwQYGSI9RBjHyIygKLR56b

      - name: Checks de saúde do banco (guardião-24-7)
        run: |
          RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/guardiao-24-7")
          echo "guardiao-24-7 HTTP $RESP"
        env:
          CRON_SECRET: ${{ secrets.VOVO_CRON_SECRET }}
          APP_URL: https://receitinhas-vovo-teresinha.vercel.app

      - name: Commitar correções (se o guardião corrigiu algo)
        run: |
          git config user.name  "Guardião BioNexus"
          git config user.email "guardian@bionexus.local"
          # Adiciona apenas arquivos do app Vovó Teresinha e estado de incidentes
          git add squads/vovo-teresinha/app/src/ || true
          git add squads/vovo-teresinha/guardian/incidents.json || true
          if git diff --staged --quiet; then
            echo "Sem correções para commitar."
            exit 0
          fi
          git commit -m "fix(auto): guardião corrigiu falha detectada $(date +'%Y-%m-%d %H:%M UTC')"

          # Tenta pushar com retry: se outro workflow empurrou commits no meio
          # tempo, faz rebase em cima do main remoto e tenta de novo.
          for tentativa in 1 2 3; do
            if git push; then
              echo "Push concluído na tentativa $tentativa."
              exit 0
            fi
            echo "Push falhou (tentativa $tentativa) — buscando atualizações e tentando rebase..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase com conflito — abortando rebase, descartando correção desta rodada."
              git rebase --abort
              exit 0
            fi
          done
          echo "Push falhou após 3 tentativas — correção será refeita na próxima execução."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
