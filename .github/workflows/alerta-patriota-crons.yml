name: Alerta Patriota — Crons 3x/dia

on:
  schedule:
    # Coleta notícias 3x/dia (UTC = 9h, 15h, 21h = 6h, 12h, 18h BRT)
    - cron: '0 9,15,21 * * *'
    # Radar político e fiscais a cada 30min das 8h às 23h BRT (11h às 2h UTC)
    - cron: '0,30 11-23,0,1,2 * * *'
    # Bot Responder a cada 5min (horário ativo BRT = 11h-02h UTC)
    - cron: '*/5 11-23,0,1,2 * * *'
    # Gerentes a cada 10min (críticos — precisam de resposta rápida)
    - cron: '*/10 * * * *'
    # VIP + Elite extras — 3 publicações adicionais (10h, 16h, 22h BRT = 13h, 19h, 1h UTC)
    - cron: '0 13,19,1 * * *'
    # Márcio Crise — verifica crise a cada 2h
    - cron: '0 */2 * * *'
    # Tereza Termômetro — todo domingo às 23h UTC (20h BRT)
    - cron: '0 23 * * 0'
    # Davi Dossiê PDF Elite — todo sábado às 13h UTC (10h BRT)
    - cron: '0 13 * * 6'
    # Análise Semanal VIP — toda segunda às 10h UTC (7h BRT)
    - cron: '0 10 * * 1'
    # Squad Revisão de Código — fiscais a cada 6h (3h, 9h, 15h, 21h UTC)
    - cron: '0 3,9,15,21 * * *'
    # Guardião 24/7 — fiscaliza squad de revisão a cada 30min (24h, 7 dias)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      etapa:
        description: 'Etapa a executar (coletar|curar|resumir|publicar|radar|tudo)'
        required: false
        default: 'tudo'

permissions:
  contents: read

jobs:
  # ── COLETA DE NOTÍCIAS ────────────────────────────────────────────────────
  # MOVIDO para alerta-patriota-noticias.yml (pipeline dedicado 3x/dia).
  # Mantido aqui com if para workflow_dispatch manual apenas.
  coletar:
    name: Neto Notícias — Coletar RSS
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Coletar notícias dos sites de direita
        run: |
          curl -s -X GET \
            "${{ secrets.ALERTA_APP_URL }}/api/cron/coletar-noticias" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            | tee /tmp/coletar.json
          echo "Resultado: $(cat /tmp/coletar.json)"

  # ── CURADORIA ────────────────────────────────────────────────────────────
  curar:
    name: Curador Carlos — Selecionar melhores
    runs-on: ubuntu-latest
    needs: coletar
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Aguardar processamento da coleta
        run: sleep 30
      - name: Curar notícias com Claude
        run: |
          curl -s -X GET \
            "${{ secrets.ALERTA_APP_URL }}/api/cron/curar-noticias" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            | tee /tmp/curar.json
          echo "Resultado: $(cat /tmp/curar.json)"

  # ── RESUMO COM IA ─────────────────────────────────────────────────────────
  resumir:
    name: Bernardo Resumidor — Claude escreve como Capitão Braga
    runs-on: ubuntu-latest
    needs: curar
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 8
    steps:
      - name: Aguardar curadoria
        run: sleep 30
      - name: Gerar resumos com Claude
        run: |
          curl -s -X GET \
            "${{ secrets.ALERTA_APP_URL }}/api/cron/resumir-noticias" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            | tee /tmp/resumir.json
          echo "Resultado: $(cat /tmp/resumir.json)"

  # ── FASE 5 — ELITE GLOBAL (coleta international antes das BR) ────────────
  elite-global:
    name: Elite Global — Igor Internacional + Cavalcanti Resumidor
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9,15,21 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Igor Internacional — Coleta fontes globais
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/coletar-noticias-global" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Cavalcanti Resumidor — Analisa com voz do Prof.
        run: |
          sleep 60
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/resumir-noticias-global" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Personagem da Semana (só segundas)
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/personagem-semana" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Dossiê Semanal Elite (só sábados)
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/dossie-elite" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── CONTEÚDO PREMIUM VIP E ELITE ─────────────────────────────────────────
  conteudo-premium:
    name: Agentes Premium — Bom Dia, Enquete, Radar Econômico, Resumo da Noite
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9,15,21 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: 💹 Radar Econômico Elite (10h BRT)
        if: github.event.schedule == '0 9,15,21 * * *'
        run: |
          sleep 60
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/radar-economico" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: 🗳️ Enquete do Dia VIP (15h BRT = 18h UTC → cron das 15h UTC)
        if: github.event.schedule == '0 9,15,21 * * *'
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/enquete-dia" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      # resumo-noite movido para alerta-patriota-resumo-noite.yml (00:00 UTC = 21h BRT)

  # ── FASE 7 — FACEBOOK (3x/dia + sábado) ─────────────────────────────────
  facebook:
    name: "[DESATIVADO] Facebook — Postar teaser + Semana em Revista"
    runs-on: ubuntu-latest
    # Desativado: prioridade para os grupos de WhatsApp
    if: false
    timeout-minutes: 10
    steps:
      - name: Postar teaser no Facebook
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/facebook-postar" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"
      - name: Semana em Revista (só sábados)
        run: |
          sleep 30
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/semana-em-revista" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── INSTAGRAM @roberto.braga.alerta.patriota ────────────────────────────
  instagram-story:
    name: "[DESATIVADO] Instagram — Story Bom Dia (8h BRT)"
    runs-on: ubuntu-latest
    # Desativado: prioridade para os grupos de WhatsApp
    if: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'squads/alerta-patriota/automation/package.json' }
      - name: Instalar dependências
        run: npm install
        working-directory: squads/alerta-patriota/automation
      - name: Instalar FFMPEG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version
      - name: Publicar Story Bom Dia
        working-directory: squads/alerta-patriota/automation
        env:
          DATABASE_URL:             ${{ secrets.ALERTA_DB_URL }}
          IG_USER_ID:               ${{ secrets.ALERTA_IG_USER_ID }}
          IG_ACCESS_TOKEN:          ${{ secrets.ALERTA_IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME:    ${{ secrets.ALERTA_CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_APP_URL:      https://alertapatriota.vercel.app
        run: node instagram-story.cjs

  instagram-reels:
    name: "[DESATIVADO] Instagram — Reel de Notícias (12h BRT)"
    runs-on: ubuntu-latest
    # Desativado: prioridade para os grupos de WhatsApp
    if: false
    needs: instagram-story
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'squads/alerta-patriota/automation/package.json' }
      - run: npm install
        working-directory: squads/alerta-patriota/automation
      - name: Instalar FFMPEG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Publicar Reel de Notícias
        working-directory: squads/alerta-patriota/automation
        env:
          DATABASE_URL:             ${{ secrets.ALERTA_DB_URL }}
          IG_USER_ID:               ${{ secrets.ALERTA_IG_USER_ID }}
          IG_ACCESS_TOKEN:          ${{ secrets.ALERTA_IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME:    ${{ secrets.ALERTA_CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_APP_URL:      https://alertapatriota.vercel.app
        run: node instagram-reels.cjs

  instagram-responder:
    name: "[DESATIVADO] Instagram — Responder comentários"
    runs-on: ubuntu-latest
    # Desativado: prioridade para os grupos de WhatsApp
    if: false
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'squads/alerta-patriota/automation/package.json' }
      - run: npm install
        working-directory: squads/alerta-patriota/automation
      - name: Responder comentários com CTA
        working-directory: squads/alerta-patriota/automation
        env:
          DATABASE_URL:      ${{ secrets.ALERTA_DB_URL }}
          IG_USER_ID:        ${{ secrets.ALERTA_IG_USER_ID }}
          IG_ACCESS_TOKEN:   ${{ secrets.ALERTA_IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: https://alertapatriota.vercel.app
        run: node instagram-responder.cjs

  facebook-comentarios:
    name: "[DESATIVADO] Facebook — Responder comentários com CTA"
    runs-on: ubuntu-latest
    # Desativado: prioridade para os grupos de WhatsApp
    if: false
    timeout-minutes: 5
    steps:
      - name: Responder comentários
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/facebook-comentarios" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"
      - name: Fiscal Facebook — token válido?
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-facebook" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── BOT DE RESPOSTAS (a cada 5min — resposta rápida aos membros VIP/Elite) ──
  bot-responder:
    name: Bot Responder — VIP e Elite (5min)
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 11-23,0,1,2 * * *' || github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 3
    steps:
      - name: Processar fila de respostas
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/bot-responder" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── GERENTES (a cada 10min — resposta rápida a problemas críticos) ─────────
  gerentes-rapidos:
    name: Gerentes — Consolidação hierárquica (10min)
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/10 * * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Coronel Técnico — Infraestrutura
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-tecnico" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"
      - name: Sargento Conteúdo — Pipeline e Cards
        run: |
          sleep 5
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-conteudo" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"
      - name: Major Financeiro — Receita e Pagamentos
        run: |
          sleep 5
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-financeiro" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"
      - name: Capitã Clientes — Membros e Retenção
        run: |
          sleep 5
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-clientes" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── FASE 4 — ENGAJAMENTO E RETENÇÃO (1x/dia às 9h BRT) ──────────────────
  engajamento:
    name: Agentes de Engajamento e Retenção
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9,15,21 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - name: Enzo Engajamento — Trials e Inativos
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/engajamento" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Rodrigo Risco — Preditor de Churn
        run: |
          sleep 30
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/preditor-churn" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Diego Desistentes — Caçador de Cancelamentos
        run: |
          sleep 30
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/cacador-desistentes" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Rebeca Recuperação — Sequência 30 dias
        run: |
          sleep 30
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/campanha-recuperacao" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Miguel Moderação — Remove cancelados dos grupos
        run: |
          sleep 30
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/moderacao-grupo" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Ulisses Upgrade — Top 10% engajados (só segunda)
        run: |
          sleep 30
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/upgrade-comportamental" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── FASE 4 — FISCAIS 24/7 (a cada 30min) ─────────────────────────────────
  # FASE 15/16: dividido em 3 jobs paralelos (era 1 job com 23 steps sequenciais
  # que estourava o timeout-minutes:5 e era CANCELADO sem nenhum alerta — confirmado
  # em produção via `gh run list`). Cada curl agora tem --max-time para que uma
  # falha de rede vire falha do step (curl -e/-eo pipefail) em vez de travar o job
  # inteiro até o timeout. Pior caso por job: 8 steps × 20s + 7×5s sleep ≈ 195s,
  # bem dentro dos 5min mesmo se todas as chamadas travarem no limite.
  fiscais-a:
    name: Fiscais 24/7 (A) — Login, API, WhatsApp, Banco, Pagamentos, Segurança, Cards, Duplicatas
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Lisa Login — Testa autenticação
        run: |
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-login" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: André API — Testa rotas críticas
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-api" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Wanderley WhatsApp — Testa Evolution API
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-whatsapp" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Bruna Banco — Testa conexão Neon (a cada 10min — executa em todas as rodadas)
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-banco" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Felipe Fiscal — Verifica pagamentos pendentes
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-pagamentos" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Gustavo Guarda — Varredura de segurança
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/guardiao-seguranca" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Flora Foto — Fiscal de Cards
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-cards" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Diana Duplicata — Fiscal de Duplicatas
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-duplicatas" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Notificar falha dos fiscais (A)
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FISCAIS 24/7 (A) — FALHA/TIMEOUT*
          Um ou mais fiscais do grupo A falharam ou travaram. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  fiscais-b:
    name: Fiscais 24/7 (B) — Conteúdo, Workflow, Escalonamento, Não-Conversão, Pipeline, Notícias, Fontes, Agendamento
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Clara Conteúdo — Fiscal de Conteúdo
        run: |
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-conteudo" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Wagner Workflow — Fiscal do GitHub Actions
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-workflow" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            -H "X-Github-Token: ${{ secrets.ALERTA_GITHUB_TOKEN }}"

      - name: Escalonamento Claude — Alertas críticos sem resolução
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/escalar-claude" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Sequência Não-Conversão — E-mails automáticos para leads
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/sequencia-nao-conversao" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Mateus Manchete — Fiscal de Pipeline
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-pipeline" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Sofia Stoque — Fiscal de Estoque de Notícias
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-noticias" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Roberto RSS — Fiscal de Fontes RSS
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-fontes" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Pedro Pontual — Fiscal de Agendamento
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-agendamento" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      # FASE 17: antes a rota /api/cron/modo-crise?acao=verificar nunca era chamada
      # por nada (nem cron, nem outra rota) — modo crise nunca ativava nem
      # desativava automaticamente. Agora roda junto com os fiscais B (a cada 30min).
      - name: Márcio Crise — Verifica modo de emergência
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/modo-crise?acao=verificar" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Notificar falha dos fiscais (B)
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FISCAIS 24/7 (B) — FALHA/TIMEOUT*
          Um ou mais fiscais do grupo B falharam ou travaram. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  fiscais-c:
    name: Fiscais 24/7 (C) — Especiais, MRR, Trials, Grupos, Inadimplência, APIs Externas, Qualidade
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Vera Verificação — Fiscal de Publicações Especiais
        run: |
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-especiais" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Marcos MRR — Fiscal de Receita
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-mrr" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Tereza Trial — Fiscal de Trials
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-trials" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Carlos Cargo — Fiscal de Membros nos Grupos
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-grupos" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Inaê Inadimplência — Fiscal Financeiro
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-inadimplentes" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Arturo Apis — Fiscal de APIs Externas
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-apis-externas" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Vitor Validador — Fiscal de Qualidade dos Resumos
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-qualidade-resumo" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Notificar falha dos fiscais (C)
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FISCAIS 24/7 (C) — FALHA/TIMEOUT*
          Um ou mais fiscais do grupo C falharam ou travaram. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── GERENTES (consolidação hierárquica) — roda depois dos 3 grupos de fiscais
  # via `needs`, preservando a ordem original ("rodam por último"). `if: always()`
  # garante que a consolidação roda mesmo se um dos grupos travou (modo degradado),
  # desde que o schedule seja o correto.
  gerentes-consolidacao:
    name: Gerentes — Consolidação hierárquica (pós-fiscais)
    runs-on: ubuntu-latest
    needs: [fiscais-a, fiscais-b, fiscais-c]
    if: always() && (github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 5
    steps:
      - name: Coronel Técnico — Gerente de Infraestrutura
        run: |
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-tecnico" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Sargento Conteúdo — Gerente de Conteúdo
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-conteudo" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Major Financeiro — Gerente Financeiro
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-financeiro" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Capitã Clientes — Gerente de Clientes
        run: |
          sleep 5
          curl -s --max-time 20 "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-clientes" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Notificar falha dos gerentes
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *GERENTES — FALHA/TIMEOUT*
          Um ou mais gerentes de consolidação falharam ou travaram. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── FLORA FOTO — GERADOR DE CARDS (envio para WhatsApp) ───────────────────
  # Endpoint /api/cron/gerar-card nunca era chamado por nenhum cron — causa
  # raiz dos alertas "cards_sem_envio". Apenas VIP e Elite (grupos ativos).
  gerador-cards:
    name: Flora Foto — Gerador de Cards (envio WhatsApp)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Card VIP
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerar-card?plano=vip" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

      - name: Card Elite
        run: |
          sleep 10
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerar-card?plano=elite" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── FASE 4 — BACKUP DIÁRIO (às 3h BRT = 6h UTC) ──────────────────────────
  backup:
    name: Bruno Backup — Snapshot diário
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9,15,21 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Snapshot de integridade do banco
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/backup" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── FASE 4 — GENERAL ALVES CEO (às 8h BRT = 11h UTC) ────────────────────
  ceo:
    name: General Alves CEO — Relatório diário
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9,15,21 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Relatório diário + escalonamento para Claude
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/relatorio-ceo" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"

  # ── RADAR POLÍTICO (roda independente a cada 30min) ──────────────────────
  radar:
    name: Raquel Radar — Monitorar políticos 30min
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 11-23,0,1,2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Varredura de declarações virais
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/radar-politico" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            | tee /tmp/radar.json
          echo "Resultado: $(cat /tmp/radar.json)"

  # ── FASE 2 — MÁRCIO CRISE (a cada 2h) ───────────────────────────────────
  crise-monitor:
    name: Márcio Crise — Detector de crise política
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'squads/alerta-patriota/automation/package.json' }
      - name: Instalar Chromium para Puppeteer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser
          echo "PUPPETEER_EXEC_PATH=$(which chromium-browser)" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV
      - name: Instalar dependências
        run: npm install
        working-directory: squads/alerta-patriota/automation
      - name: Verificar nível de alerta e disparar modo crise
        working-directory: squads/alerta-patriota/automation
        env:
          DATABASE_URL:          ${{ secrets.ALERTA_DB_URL }}
          EVOLUTION_API_URL:     https://evolution-api-production-8be2.up.railway.app
          EVOLUTION_API_KEY:     ${{ secrets.ALERTA_EVOLUTION_KEY }}
          EVOLUTION_INSTANCIA:   alertapatriota
          WPP_GROUP_VIP:         120363425999377985@g.us
          WPP_GROUP_ELITE:       120363426153474301@g.us
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME: demazkgy2
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_APP_URL:   https://alertapatriota.vercel.app
          PUPPETEER_EXEC_PATH:   ${{ env.PUPPETEER_EXEC_PATH }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          TELEGRAM_BOT_TOKEN:    ${{ secrets.ALERTA_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}
        run: node crise-monitor.cjs
      - name: Notificar Telegram — falha
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FALHA — Márcio Crise*
          Erro no detector de crise. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── FASE 2 — TEREZA TERMÔMETRO (todo domingo 20h BRT) ───────────────────
  termometro:
    name: Tereza Termômetro — Termômetro da Liberdade (domingos)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 23 * * 0' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      # FASE 17: antes chamava o script legado whatsapp-termometro.cjs (sem guarda de
      # banco) ao mesmo tempo que vercel.json disparava /api/cron/termometro (com guarda
      # semana/ano, porém às 17h BRT em vez de 20h) — resultado: termômetro duplicado todo
      # domingo, em formatos diferentes. Unificado em um único disparo, na rota com
      # idempotência real, no horário correto.
      - name: Tereza Termômetro — Gerar e enviar Termômetro da Liberdade
        run: |
          curl -s --max-time 50 "${{ secrets.ALERTA_APP_URL }}/api/cron/termometro" -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}"
      - name: Notificar Telegram — falha
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FALHA — Tereza Termômetro*
          Erro ao gerar/enviar o Termômetro da Liberdade. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── FASE 2 — DAVI DOSSIÊ PDF ELITE (sábados 10h BRT = 13h UTC) ──────────
  dossie-elite:
    name: Davi Dossiê — PDF Semanal Elite (sábados)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13 * * 6' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'squads/alerta-patriota/automation/package.json' }
      - name: Instalar Chromium para Puppeteer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser
          echo "PUPPETEER_EXEC_PATH=$(which chromium-browser)" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV
      - name: Instalar dependências
        run: npm install
        working-directory: squads/alerta-patriota/automation
      - name: Gerar e enviar Dossiê PDF ao grupo Elite
        working-directory: squads/alerta-patriota/automation
        env:
          DATABASE_URL:          ${{ secrets.ALERTA_DB_URL }}
          EVOLUTION_API_URL:     https://evolution-api-production-8be2.up.railway.app
          EVOLUTION_API_KEY:     ${{ secrets.ALERTA_EVOLUTION_KEY }}
          EVOLUTION_INSTANCIA:   alertapatriota
          WPP_GROUP_ELITE:       120363426153474301@g.us
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          CLOUDINARY_CLOUD_NAME: demazkgy2
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_APP_URL:   https://alertapatriota.vercel.app
          PUPPETEER_EXEC_PATH:   ${{ env.PUPPETEER_EXEC_PATH }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          TELEGRAM_BOT_TOKEN:    ${{ secrets.ALERTA_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}
        run: node whatsapp-dossie.cjs
      - name: Notificar Telegram — falha
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FALHA — Davi Dossiê PDF*
          Erro ao gerar o Dossiê Semanal Elite. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── FASE 2 — ANÁLISE SEMANAL VIP (segundas 7h BRT = 10h UTC) ────────────
  analise-semanal-vip:
    name: Análise Semanal — Semana em Perspectiva VIP (segundas)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 10 * * 1' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Enviar Análise Semanal ao grupo VIP
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/analise-semanal-vip" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            | tee /tmp/analise-vip.json
          echo "Resultado: $(cat /tmp/analise-vip.json)"

  # ── SQUAD REVISÃO DE CÓDIGO (a cada 6h: 3h, 9h, 15h, 21h UTC) ──────────
  fiscais-codigo:
    name: Fiscais de Código — Segurança + Schema + Lógica + Performance
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3,9,15,21 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Fiscal Segurança — Testa proteções ao vivo
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-codigo-seguranca" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" | tee /tmp/seg.json
          echo "Segurança: $(cat /tmp/seg.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get(\"ok\",False))')"

      - name: Fiscal Schema — Verifica schema DB vs código
        run: |
          sleep 5
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-codigo-schema" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" | tee /tmp/schema.json
          echo "Schema: $(cat /tmp/schema.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get(\"ok\",False))')"

      - name: Fiscal Lógica — Verifica pipeline e lógica de negócio
        run: |
          sleep 5
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-codigo-logica" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" | tee /tmp/logica.json
          echo "Lógica: $(cat /tmp/logica.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get(\"ok\",False))')"

      - name: Fiscal Performance — Verifica backlog e latências
        run: |
          sleep 5
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/fiscal-codigo-performance" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" | tee /tmp/perf.json
          echo "Performance: $(cat /tmp/perf.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get(\"ok\",False))')"

      - name: Notificar falha dos fiscais
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *FISCAIS DE CÓDIGO — FALHA*
          Um ou mais fiscais de código falharam. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── GERENTE DE CÓDIGO (a cada 2h, consolida e comanda Claude Revisor) ────
  gerente-codigo:
    name: Gerente de Código — Consolidação e Claude Revisor
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Gerente Código — Consolida alertas e aciona Claude Revisor
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/gerente-codigo" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" | tee /tmp/gerente.json
          echo "Resultado: $(cat /tmp/gerente.json)"

      - name: Agente Médico — Checagem de saúde do banco (auto-cura)
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/agente-medico?servico=banco" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" | tee /tmp/medico.json
          echo "Resultado: $(cat /tmp/medico.json)"

  # ── GUARDIÃO 24/7 — fiscaliza squad de revisão a cada 30min ─────────────
  guardiao-24-7:
    name: Guardião — Fiscaliza Squad de Revisão de Código (30min)
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Gustavo Guarda — Verifica e dispara agentes de revisão de código
        run: |
          curl -s "${{ secrets.ALERTA_APP_URL }}/api/cron/guardiao-seguranca" \
            -H "Authorization: Bearer ${{ secrets.ALERTA_CRON_SECRET }}" \
            | tee /tmp/guardiao.json
          echo "Guardião: $(cat /tmp/guardiao.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print("ok=" + str(d.get("ok",False)) + " disparados=" + str(len(d.get("disparados",[]))))')"

      - name: Notificar falha do Guardião
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.ALERTA_TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ALERTA_TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=❌ *GUARDIÃO 24/7 — FALHOU*
          O Guardião de Revisão de Código falhou. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
