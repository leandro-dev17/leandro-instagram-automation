name: Regerar Imagem Única

on:
  workflow_dispatch:

jobs:
  regerar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install @neondatabase/serverless
        working-directory: squads/vovo-teresinha/automation
      - run: node regerar-uma.cjs
        working-directory: squads/vovo-teresinha/automation
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
