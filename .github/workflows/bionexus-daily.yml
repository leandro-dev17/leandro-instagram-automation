name: BioNexus — Publicações Diárias

on:
  schedule:
    # Todos os horários em UTC (BRT = UTC-3)
    - cron: '0 8 * * *'      # 05:00 BRT — Gerador diário
    - cron: '0 10 * * *'     # 07:00 BRT — Story (5 slides)
    - cron: '59 14 * * *'    # 11:59 BRT — Reel Kling
    - cron: '0 18 * * *'     # 15:00 BRT — Carrossel (7 slides)
    - cron: '30 20 * * *'    # 17:30 BRT — Reel Dica do Personal
  workflow_dispatch:
    inputs:
      job:
        description: 'Job para executar manualmente (daily-generator | story-07h | carousel-12h | reel-dica-1730h | kling-reel-20h)'
        required: false
        default: 'daily-generator'

permissions:
  contents: write
  actions: read

env:
  AUTOMATION_DIR: squads/leandro-instagram/automation
  OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
  # Força IPv4 em todas as chamadas Node.js (evita ENETUNREACH em IPv6 no runner)
  NODE_OPTIONS: --dns-result-order=ipv4first
  # Compatibilidade com Node.js 24 (obrigatório a partir de 02/06/2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

# ── Helper: cria .env (usado em todos os jobs) ──────────────────────────────
# Nota: cada job precisa recriar o .env pois o runner é limpo a cada execução

jobs:
  # ── 05:00 BRT — Gerador diário ─────────────────────────────────────────────
  daily-generator:
    if: >
      github.event.schedule == '0 8 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-generator')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Rodar gerador diário
        run: node daily-generator.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Salvar imagens geradas como artifact
        continue-on-error: true   # cota esgotada não deve falhar o job inteiro
        uses: actions/upload-artifact@v4
        with:
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          retention-days: 2
          overwrite: true
      - name: Commitar schedule e recipe-tracker atualizados
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/schedule/ || true
          git add squads/leandro-instagram/automation/recipes/recipe-tracker.json || true
          git diff --staged --quiet || git commit -m "chore: conteúdo gerado $(date +%Y-%m-%d\ %H:%M)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 07:00 BRT — Story (5 slides) ───────────────────────────────────────────
  story-07h:
    if: >
      github.event.schedule == '0 10 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'story-07h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências, ffmpeg e Playwright
        run: npm install && sudo apt-get install -y ffmpeg && npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Tentar baixar imagens do dia (artifact do daily-generator)
        id: download-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Gerar imagens do dia se não vieram no artifact
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUTDIR="${{ github.workspace }}/squads/leandro-instagram/automation/temp-output/$TODAY"
          if [ ! -f "$OUTDIR/story-slide1.png" ]; then
            echo "⚠️  Artifact sem story ($OUTDIR) — gerando com daily-generator..."
            node daily-generator.cjs
          else
            echo "✅ Story já disponível no artifact — pulando geração"
          fi
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Publicar Story (5 slides)
        run: node story-publisher-new.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 15:00 BRT — Carrossel (7 slides) ───────────────────────────────────────
  carousel-12h:
    if: >
      github.event.schedule == '0 18 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'carousel-12h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências, ffmpeg e Playwright
        run: npm install && sudo apt-get install -y ffmpeg && npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Tentar baixar imagens do dia (artifact do daily-generator)
        id: download-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Gerar imagens do dia se não vieram no artifact
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUTDIR="${{ github.workspace }}/squads/leandro-instagram/automation/temp-output/$TODAY"
          if [ ! -f "$OUTDIR/carousel-slide1.png" ]; then
            echo "⚠️  Artifact sem carrossel ($OUTDIR) — gerando com daily-generator..."
            node daily-generator.cjs
          else
            echo "✅ Carrossel já disponível no artifact — pulando geração"
          fi
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Publicar Carrossel (7 slides)
        run: node carousel-publisher.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 17:30 BRT — Reel Dica do Personal ─────────────────────────────────────
  # Job auto-suficiente: gera a dica localmente se o artifact do daily-generator
  # não estiver disponível, eliminando a dependência frágil entre jobs.
  reel-dica-1730h:
    if: >
      github.event.schedule == '30 20 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'reel-dica-1730h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências e Playwright
        run: npm install && sudo apt-get install -y ffmpeg && npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Tentar baixar imagens do dia (artifact do daily-generator)
        id: download-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Gerar dica do dia se não veio no artifact
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUTDIR="${{ github.workspace }}/squads/leandro-instagram/automation/temp-output/$TODAY"
          if [ ! -f "$OUTDIR/dica-data.json" ] || [ ! -f "$OUTDIR/reel-dica.png" ]; then
            echo "⚠️  Artifact sem dica ($OUTDIR) — gerando dica standalone..."
            node generate-dica-standalone.cjs
          else
            echo "✅ Dica já disponível no artifact — pulando geração"
          fi
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Publicar Reel Dica do Personal
        run: node reel-publisher.cjs 6
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Commitar recipe-tracker atualizado
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/recipes/recipe-tracker.json || true
          git diff --staged --quiet || git commit -m "chore: recipe tracker atualizado $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 11:59 BRT — Reel Kling ────────────────────────────────────────────────
  kling-reel-20h:
    if: >
      github.event.schedule == '59 14 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'kling-reel-20h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências e ffmpeg
        run: npm install && sudo apt-get install -y ffmpeg fonts-dejavu-core
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/kling-pool
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Publicar Reel Kling
        run: node kling-publisher.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          TEMP_DIR: /tmp/bionexus_render
