name: BioNexus — Publicações Diárias

on:
  schedule:
    # Todos os horários em UTC (BRT = UTC-3)
    - cron: '0 8 * * *'      # 05:00 BRT — Gerador diário (Story + Carrossel)
    - cron: '0 10 * * *'     # 07:00 BRT — Story (5 slides)
    - cron: '0 15 * * *'     # 12:00 BRT — Carrossel (7 slides)
    - cron: '30 20 * * *'    # 17:30 BRT — Reel Dica do Personal
  workflow_dispatch:
    inputs:
      job:
        description: 'Job para executar manualmente (daily-generator | story-07h | carousel-12h | reel-dica-1730h)'
        required: false
        default: 'daily-generator'

permissions:
  contents: write
  actions: read

env:
  AUTOMATION_DIR: squads/leandro-instagram/automation
  OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

defaults:
  run:
    shell: bash

# ── Helper: cria .env (usado em todos os jobs) ──────────────────────────────
# Nota: cada job precisa recriar o .env pois o runner é limpo a cada execução

jobs:
  # ── 05:00 BRT — Gerador diário ─────────────────────────────────────────────
  daily-generator:
    if: >
      github.event.schedule == '0 8 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-generator')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Rodar gerador diário
        run: node daily-generator.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Salvar imagens geradas como artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          retention-days: 1
          overwrite: true
      - name: Commitar schedule atualizado
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/schedule/ || true
          git diff --staged --quiet || git commit -m "chore: conteúdo gerado $(date +%Y-%m-%d\ %H:%M)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 07:00 BRT — Story (5 slides) ───────────────────────────────────────────
  story-07h:
    if: >
      github.event.schedule == '0 10 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'story-07h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Baixar imagens do dia
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: fail
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Publicar Story (5 slides)
        run: node story-publisher-new.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 12:00 BRT — Carrossel (7 slides) ───────────────────────────────────────
  carousel-12h:
    if: >
      github.event.schedule == '0 15 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'carousel-12h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Baixar imagens do dia
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: fail
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Publicar Carrossel (7 slides)
        run: node carousel-publisher.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 17:30 BRT — Reel Dica do Personal ─────────────────────────────────────
  reel-dica-1730h:
    if: >
      github.event.schedule == '30 20 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'reel-dica-1730h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install && sudo apt-get install -y ffmpeg
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Baixar imagens do dia
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: fail
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Publicar Reel Dica do Personal
        run: node reel-publisher.cjs 6
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 20:00 BRT — Reel Kling (aguardando API) ────────────────────────────────
  # Desabilitado até Kling confirmar assinatura de API
  # Para habilitar: adicionar cron '0 23 * * *' no topo e remover o 'if: false'
  kling-reel-20h:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Kling Reel desabilitado — aguardando confirmação de API"
