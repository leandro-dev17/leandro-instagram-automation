name: BioNexus — Publicações Diárias

on:
  schedule:
    # Todos os horários em UTC (BRT = UTC-3)
    - cron: '*/15 * * * *'   # A cada 15 min — Guardião (monitora tudo + aciona Claude se necessário)
    - cron: '0 8 * * *'      # 05:00 BRT — Gerador diário
    - cron: '15 8 * * *'     # 05:15 BRT — Inspector de Imagens (valida arquivos gerados)
    - cron: '30 8 * * *'     # 05:30 BRT — Fiscal de Cronograma
    - cron: '0 10 * * *'     # 07:00 BRT — Story (5 slides)
    - cron: '0 12 * * *'     # 09:00 BRT — Fiscal Temas Repetidos (diversidade de assuntos)
    - cron: '0 16 * * *'     # 13:00 BRT — Fiscal de Horários (detecta falhas da manhã)
    - cron: '30 16 * * *'    # 13:30 BRT — Fiscal Hooks Kling (qualidade dos textos)
    - cron: '59 14 * * *'    # 11:59 BRT — Reel Kling
    - cron: '0 18 * * *'     # 15:00 BRT — Carrossel (7 slides)
    - cron: '30 20 * * 0,1,3,5'  # 17:30 BRT Seg/Qua/Sex/Dom — Reel Receita (4x/semana)
    - cron: '30 21 * * *'    # 18:30 BRT — Fiscal Qualidade Kling (diversidade de modelos)
    - cron: '0 22 * * *'     # 19:00 BRT — Fiscal de Publicações (detecta falhas + recuperação)
    - cron: '15 23 * * *'    # 20:15 BRT — Fiscal Conteúdo Semana (taxa semanal por tipo)
    - cron: '45 23 * * *'    # 20:45 BRT — Relatório Diário (resumo do dia)
    - cron: '50 23 * * *'    # 20:50 BRT — Backup de Publicações (histórico no GitHub)
  workflow_dispatch:
    inputs:
      job:
        description: 'Job: daily-generator|story-07h|carousel-12h|reel-dica-1730h|kling-reel-20h|guardiao|fiscal-publicacoes|fiscal-horarios|fiscal-cronograma|fiscal-qualidade-kling|fiscal-conteudo-semana|fiscal-hooks-kling|fiscal-temas-repetidos|relatorio-diario|backup-publicacoes|inspector-imagens'
        required: false
        default: 'daily-generator'

permissions:
  contents: write
  actions: write

env:
  AUTOMATION_DIR: squads/leandro-instagram/automation
  OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
  # Força IPv4 em todas as chamadas Node.js (evita ENETUNREACH em IPv6 no runner)
  NODE_OPTIONS: --dns-result-order=ipv4first
  # Compatibilidade com Node.js 24 (obrigatório a partir de 02/06/2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

# ── Helper: cria .env (usado em todos os jobs) ──────────────────────────────
# Nota: cada job precisa recriar o .env pois o runner é limpo a cada execução

jobs:
  # ── 05:00 BRT — Gerador diário ─────────────────────────────────────────────
  daily-generator:
    if: >
      github.event.schedule == '0 8 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-generator')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Instalar Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Rodar gerador diário
        run: node daily-generator.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Salvar imagens geradas como artifact
        continue-on-error: true   # cota esgotada não deve falhar o job inteiro
        uses: actions/upload-artifact@v4
        with:
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          retention-days: 2
          overwrite: true
      - name: Commitar schedule e recipe-tracker atualizados
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/schedule/ || true
          git add squads/leandro-instagram/automation/recipes/recipe-tracker.json || true
          git diff --staged --quiet || git commit -m "chore: conteúdo gerado $(date +%Y-%m-%d\ %H:%M)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 07:00 BRT — Story (5 slides) ───────────────────────────────────────────
  story-07h:
    if: >
      github.event.schedule == '0 10 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'story-07h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências, ffmpeg e Playwright
        run: npm install && sudo apt-get update -q && sudo apt-get install -y --fix-missing ffmpeg && npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Tentar baixar imagens do dia (artifact do daily-generator)
        id: download-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Gerar imagens do dia se não vieram no artifact
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUTDIR="${{ github.workspace }}/squads/leandro-instagram/automation/temp-output/$TODAY"
          if [ ! -f "$OUTDIR/story-slide1.png" ]; then
            echo "⚠️  Artifact sem story ($OUTDIR) — gerando com daily-generator..."
            node daily-generator.cjs
          else
            echo "✅ Story já disponível no artifact — pulando geração"
          fi
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Publicar Story (5 slides)
        run: node story-publisher-new.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 15:00 BRT — Carrossel (7 slides) ───────────────────────────────────────
  carousel-12h:
    if: >
      github.event.schedule == '0 18 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'carousel-12h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências, ffmpeg e Playwright
        run: npm install && sudo apt-get update -q && sudo apt-get install -y --fix-missing ffmpeg && npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Tentar baixar imagens do dia (artifact do daily-generator)
        id: download-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Gerar imagens do dia se não vieram no artifact
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUTDIR="${{ github.workspace }}/squads/leandro-instagram/automation/temp-output/$TODAY"
          if [ ! -f "$OUTDIR/carousel-slide1.png" ]; then
            echo "⚠️  Artifact sem carrossel ($OUTDIR) — gerando com daily-generator..."
            node daily-generator.cjs
          else
            echo "✅ Carrossel já disponível no artifact — pulando geração"
          fi
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Publicar Carrossel (7 slides)
        run: node carousel-publisher.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output

  # ── 17:30 BRT — Reel Dica do Personal ─────────────────────────────────────
  # Job auto-suficiente: gera a dica localmente se o artifact do daily-generator
  # não estiver disponível, eliminando a dependência frágil entre jobs.
  reel-dica-1730h:
    if: >
      github.event.schedule == '30 20 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'reel-dica-1730h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências e Playwright
        run: npm install && sudo apt-get update -q && sudo apt-get install -y --fix-missing ffmpeg && npx playwright install chromium --with-deps
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/temp-output
      - name: Tentar baixar imagens do dia (artifact do daily-generator)
        id: download-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bionexus-daily.yml
          name: daily-images
          path: squads/leandro-instagram/automation/temp-output/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Gerar dica do dia se não veio no artifact
        run: |
          TODAY=$(date +%Y-%m-%d)
          OUTDIR="${{ github.workspace }}/squads/leandro-instagram/automation/temp-output/$TODAY"
          if [ ! -f "$OUTDIR/dica-data.json" ] || [ ! -f "$OUTDIR/reel-dica.png" ]; then
            echo "⚠️  Artifact sem dica ($OUTDIR) — gerando dica standalone..."
            node generate-dica-standalone.cjs
          else
            echo "✅ Dica já disponível no artifact — pulando geração"
          fi
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Publicar Reel Dica do Personal
        run: node reel-publisher.cjs 6
        working-directory: squads/leandro-instagram/automation
        env:
          OUTPUT_DIR: ${{ github.workspace }}/squads/leandro-instagram/automation/temp-output
      - name: Commitar recipe-tracker atualizado
        run: |
          git config user.name "BioNexus Bot"
          git config user.email "bot@bionexus.local"
          git add squads/leandro-instagram/automation/recipes/recipe-tracker.json || true
          git diff --staged --quiet || git commit -m "chore: recipe tracker atualizado $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 11:59 BRT — Reel Kling ────────────────────────────────────────────────
  kling-reel-20h:
    if: >
      github.event.schedule == '59 14 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'kling-reel-20h')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências e ffmpeg
        run: npm install && sudo apt-get update -q && sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu-core
        working-directory: squads/leandro-instagram/automation
      - name: Criar pastas necessárias
        run: mkdir -p squads/leandro-instagram/automation/logs squads/leandro-instagram/automation/temp squads/leandro-instagram/automation/kling-pool
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          KIE_API_KEY=${{ secrets.KIE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          KLING_ACCESS_KEY=${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY=${{ secrets.KLING_SECRET_KEY }}
          EOF
      - name: Publicar Reel Kling
        run: node kling-publisher.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          TEMP_DIR: /tmp/bionexus_render
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 05:30 BRT — Fiscal de Cronograma ───────────────────────────────────────
  fiscal-cronograma:
    if: >
      github.event.schedule == '30 8 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fiscal-cronograma')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY=${{ github.repository }}
          EOF
      - name: Rodar Fiscal de Cronograma
        run: node fiscal-cronograma.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 19:00 BRT — Fiscal de Publicações (detecta falhas + recuperação) ────────
  fiscal-publicacoes:
    if: >
      github.event.schedule == '0 22 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fiscal-publicacoes')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Fiscal de Publicações
        run: node fiscal-publicacoes.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 20:45 BRT — Relatório Diário ────────────────────────────────────────────
  relatorio-diario:
    if: >
      github.event.schedule == '45 23 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'relatorio-diario')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Relatório Diário
        run: node relatorio-diario.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── A cada 15 min — Guardião Central ────────────────────────────────────────
  guardiao:
    if: >
      github.event.schedule == '*/15 * * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'guardiao')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências
        run: npm install
        working-directory: squads/leandro-instagram/automation
      - name: Criar .env
        run: |
          cat > squads/leandro-instagram/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_TOKEN_EXPIRES_AT=${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Rodar Guardião
        run: node guardiao.cjs
        working-directory: squads/leandro-instagram/automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # ── 05:15 BRT — Inspector de Imagens ────────────────────────────────────────
  inspector-imagens:
    if: >
      github.event.schedule == '15 8 * * *' ||
