name: BioNexus — Meta Ads Monitor Diário

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT (UTC-3)
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Forçar execução mesmo sem campanhas ativas? (sim/nao)'
        required: false
        default: 'nao'

permissions:
  contents: read

jobs:
  monitor:
    name: Verificar campanhas e notificar Telegram
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar monitor Meta Ads
        run: node squads/leandro-meta-ads/monitor-github.cjs
        env:
          META_ADS_ACCESS_TOKEN:   ${{ secrets.META_ADS_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:      ${{ secrets.META_AD_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          META_ADS_MONTHLY_BUDGET: ${{ secrets.META_ADS_MONTHLY_BUDGET }}
